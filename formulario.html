<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #ffffff;
    }

    /* ---- Pantalla de login ---- */
    #login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      background-color: #111111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
    }

    .login-box h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-box label {
      display: block;
      font-size: 13px;
      color: #aaaaaa;
      margin-bottom: 6px;
    }

    .login-box input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 16px;
      background-color: #1c1c1c;
      border: 1px solid #333333;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
    }

    .login-box input:focus {
      outline: none;
      border-color: #ffffff;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-box button:hover {
      background-color: #dddddd;
    }

    #login-error {
      margin-top: 12px;
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    /* ---- Pantalla del formulario ---- */
    #form-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      padding: 12px 20px;
    }

    #exit-button {
      padding: 12px 28px;
      background-color: #e03131;
      color: #ffffff;
      border: 1px solid #e03131;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    #exit-button:hover {
      background-color: #c92a2a;
      border-color: #c92a2a;
    }

    .form-container {
      flex: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .form-container iframe {
      display: block;
      width: 100%;
      height: 80vh;
      min-height: 600px;
      border: none;
      border-radius: 12px;
    }

    /* ---- Pantalla de cierre (cubre la confirmación de Notion) ---- */
    #closing-screen {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    #closing-screen h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    #closing-screen p {
      font-size: 15px;
      color: #aaaaaa;
    }
  </style>
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen">
    <div class="login-box">
      <h1>Iniciar sesión</h1>
      <form id="login-form">
        <label for="username">Usuario</label>
        <input type="text" id="username" autocomplete="username" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" required>

        <button type="submit">Ingresar</button>
        <div id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Pantalla del formulario -->
  <div id="form-screen">
    <div class="top-bar">
      <button id="exit-button">Salir</button>
    </div>
    <div class="form-container">
      <iframe
        id="notion-iframe"
        src=""
        title="Formulario de Notion"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <!-- Pantalla de cierre -->
  <div id="closing-screen">
    <h1>¡Gracias por completar el formulario!</h1>
    <p>Ya puedes cerrar esta pestaña.</p>
  </div>

  <script>
    var USERS = {
      'Admin': '120454',
      'Usuario': '12345'
    };
    var iframeLoaded = false;
    var NOTION_URL = 'https://charming-cartoon-eba.notion.site/ebd//3796afc4fc1e8011ad38d81d2c5ef7b3';
    var isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

    var loginScreen = document.getElementById('login-screen');
    var formScreen = document.getElementById('form-screen');
    var loginForm = document.getElementById('login-form');
    var loginError = document.getElementById('login-error');
    var exitButton = document.getElementById('exit-button');

    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      if (USERS.hasOwnProperty(username) && USERS[username] === password) {
        loginError.textContent = '';
        if (isMobile) {
          window.location.href = NOTION_URL;
        } else {
          loginScreen.style.display = 'none';
          formScreen.style.display = 'flex';
          if (!iframeLoaded) {
            document.getElementById('notion-iframe').src = NOTION_URL;
            iframeLoaded = true;
          }
        }
      } else {
        loginError.textContent = 'Usuario o contraseña incorrectos.';
      }
    });

    var closingScreen = document.getElementById('closing-screen');

    exitButton.addEventListener('click', function () {
      // Cubre el formulario (y la confirmación de Notion) con una pantalla propia
      // antes de intentar cerrar la pestaña.
      formScreen.style.display = 'none';
      closingScreen.style.display = 'flex';
      window.close();
    });
  </script>
</body>
</html>
